AWSTemplateFormatVersion: '2010-09-09'
Description: 'Database Stack - RDS MySQL'

Parameters:
  EnvironmentName:
    Type: String
    Description: Environment name prefix
  DBInstanceClass:
    Type: String
    Default: db.t3.micro
    Description: RDS instance class
  DBUsername:
    Type: String
    Default: admin
    Description: Database admin username
  PrivateSubnet1Id:
    Type: String
    Description: Private Subnet 1 ID
  PrivateSubnet2Id:
    Type: String
    Description: Private Subnet 2 ID
  RDSSecurityGroupId:
    Type: String
    Description: RDS Security Group ID

Resources:
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Private subnets for RDS
      SubnetIds:
        - !Ref PrivateSubnet1Id
        - !Ref PrivateSubnet2Id
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-DBSubnetGroup

  RDSInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      AllocatedStorage: '20'
      DBInstanceClass: !Ref DBInstanceClass
      Engine: mysql
      EngineVersion: '8.0'
      MasterUsername: !Ref DBUsername
      ManageMasterUserPassword: true
      DBName: vanvyaapaar
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref RDSSecurityGroupId
      MultiAZ: false
      StorageType: gp2
      PubliclyAccessible: false
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-RDS

Outputs:
  RDSEndpoint:
    Description: RDS MySQL Endpoint
    Value: !GetAtt RDSInstance.Endpoint.Address
    Export:
      Name: !Sub ${EnvironmentName}-RDSEndpoint
  
  RDSInstanceId:
    Description: RDS Instance ID
    Value: !Ref RDSInstance
    Export:
      Name: !Sub ${EnvironmentName}-RDSInstance
  
  DatabaseName:
    Description: Database Name
    Value: vanvyaapaar
    Export:
      Name: !Sub ${EnvironmentName}-DBName
