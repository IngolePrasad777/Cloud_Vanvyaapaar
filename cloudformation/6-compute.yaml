AWSTemplateFormatVersion: '2010-09-09'
Description: 'Compute Stack - IAM Roles, Launch Templates, Auto Scaling Groups'

Parameters:
  EnvironmentName:
    Type: String
    Description: Environment name prefix
  InstanceType:
    Type: String
    Default: t3.micro
    Description: EC2 instance type
  KeyName:
    Type: String
    Default: ""
    Description: EC2 Key Pair name
  GitRepositoryURL:
    Type: String
    Description: GitHub repository URL
  PublicSubnet1Id:
    Type: String
    Description: Public Subnet 1 ID
  PublicSubnet2Id:
    Type: String
    Description: Public Subnet 2 ID
  FrontendSecurityGroupId:
    Type: String
    Description: Frontend Security Group ID
  BackendSecurityGroupId:
    Type: String
    Description: Backend Security Group ID
  FrontendTargetGroupArn:
    Type: String
    Description: Frontend Target Group ARN
  BackendTargetGroupArn:
    Type: String
    Description: Backend Target Group ARN
  ExternalALBDNS:
    Type: String
    Description: External ALB DNS Name
  RDSEndpoint:
    Type: String
    Description: RDS Endpoint Address
  RDSInstanceId:
    Type: String
    Description: RDS Instance ID
  MediaBucketName:
    Type: String
    Description: S3 Media Bucket Name
  CloudFrontURL:
    Type: String
    Description: CloudFront Distribution URL

Conditions:
  HasKeyName: !Not [!Equals [!Ref KeyName, ""]]

Resources:
  # IAM Role for EC2 instances
  AppInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess
        - arn:aws:iam::aws:policy/SecretsManagerReadWrite
      Policies:
        - PolicyName: DBDiscoveryPolicy
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - rds:DescribeDBInstances
                Resource: "*"
        - PolicyName: S3UploadPolicy
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub "arn:aws:s3:::${MediaBucketName}/*"

  AppInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref AppInstanceRole

  # Frontend Launch Template
  FrontendLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        InstanceType: !Ref InstanceType
        KeyName: !If [HasKeyName, !Ref KeyName, !Ref "AWS::NoValue"]
        IamInstanceProfile:
          Arn: !GetAtt AppInstanceProfile.Arn
        SecurityGroupIds:
          - !Ref FrontendSecurityGroupId
        ImageId: resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            exec > >(tee /var/log/user-data.log|logger -t user-data -s 2>/dev/console) 2>&1
            
            echo "=== Frontend Deployment Started ==="
            yum update -y
            yum install -y git nginx nodejs npm
            
            # Add swap space for React build
            echo "Creating swap space..."
            dd if=/dev/zero of=/swapfile bs=1M count=2048
            chmod 600 /swapfile
            mkswap /swapfile
            swapon /swapfile
            echo '/swapfile none swap sw 0 0' >> /etc/fstab
            
            # Clone Repository
            cd /home/ec2-user
            git clone ${GitRepositoryURL} project
            cd project/vanvyapaar-frontend
            
            # Create .env file
            cat > .env <<EOF
            VITE_API_URL=http://${ExternalALBDNS}
            EOF
            
            # Build frontend
            npm install --legacy-peer-deps
            export NODE_OPTIONS="--max-old-space-size=2048"
            npm run build
            
            # Configure Nginx
            sed -i 's/default_server//g' /etc/nginx/nginx.conf || true
            if [ -f nginx.conf ]; then
              cp nginx.conf /etc/nginx/conf.d/vanvyaapaar.conf
            fi
            
            rm -rf /usr/share/nginx/html/*
            if [ -d dist ]; then
              cp -rf dist/* /usr/share/nginx/html/
            elif [ -d build ]; then
              cp -rf build/* /usr/share/nginx/html/
            fi
            
            systemctl enable nginx
            systemctl start nginx
            
            if systemctl is-active --quiet nginx; then
              echo "=== Frontend Deployment Successful ==="
            else
              echo "=== Frontend Deployment Failed ==="
              systemctl status nginx
            fi

  # Backend Launch Template
  BackendLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        InstanceType: !Ref InstanceType
        KeyName: !If [HasKeyName, !Ref KeyName, !Ref "AWS::NoValue"]
        IamInstanceProfile:
          Arn: !GetAtt AppInstanceProfile.Arn
        SecurityGroupIds:
          - !Ref BackendSecurityGroupId
        ImageId: resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            exec > >(tee /var/log/user-data.log|logger -t user-data -s 2>/dev/console) 2>&1
            
            echo "=== Backend Deployment Started ==="
            yum update -y
            yum install -y git java-17-amazon-corretto-devel jq mariadb105 maven
            
            # Clone Repository
            cd /home/ec2-user
            git clone ${GitRepositoryURL} project
            cd project/vanpaayaar-backend
            
            # Set HOME for Maven wrapper
            export HOME=/root
            
            # Build Spring Boot
            echo "Building Spring Boot application..."
            if [ -f mvnw ]; then
              chmod +x mvnw
              ./mvnw clean package -DskipTests
            else
              mvn clean package -DskipTests
            fi
            
            # Wait for RDS
            echo "Waiting for RDS database..."
            until mysqladmin ping -h ${RDSEndpoint} --silent; do
              sleep 10
            done
            
            # Fetch RDS credentials
            SECRET_ARN=$(aws rds describe-db-instances \
              --db-instance-identifier ${RDSInstanceId} \
              --query "DBInstances[0].MasterUserSecret.SecretArn" \
              --region ${AWS::Region} \
              --output text)
            
            SECRET_JSON=$(aws secretsmanager get-secret-value \
              --secret-id $SECRET_ARN \
              --region ${AWS::Region} \
              --query SecretString \
              --output text)
            
            DB_USER=$(echo $SECRET_JSON | jq -r .username)
            DB_PASS=$(echo $SECRET_JSON | jq -r .password)
            DB_HOST=${RDSEndpoint}
            
            # Import dump.sql if exists
            cd /home/ec2-user/project
            if [ -f dump.sql ]; then
              mysql -h $DB_HOST -u $DB_USER -p$DB_PASS vanvyaapaar < dump.sql
              echo "Database dump imported!"
            fi
            
            # Start Spring Boot
            cd /home/ec2-user/project/vanpaayaar-backend
            nohup java -jar target/*.jar \
              --spring.datasource.url=jdbc:mysql://$DB_HOST:3306/vanvyaapaar \
              --spring.datasource.username=$DB_USER \
              --spring.datasource.password=$DB_PASS \
              --server.port=8080 \
              --aws.s3.bucket-name=${MediaBucketName} \
              --aws.cloudfront.url=${CloudFrontURL} \
              > /var/log/springboot.log 2>&1 &
            
            echo "=== Backend Deployment Complete ==="

  # Frontend Auto Scaling Group
  FrontendASG:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      VPCZoneIdentifier:
        - !Ref PublicSubnet1Id
        - !Ref PublicSubnet2Id
      LaunchTemplate:
        LaunchTemplateId: !Ref FrontendLaunchTemplate
        Version: !GetAtt FrontendLaunchTemplate.LatestVersionNumber
      MinSize: '1'
      MaxSize: '2'
      TargetGroupARNs:
        - !Ref FrontendTargetGroupArn
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-Frontend
          PropagateAtLaunch: true

  FrontendScalingPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref FrontendASG
      PolicyType: TargetTrackingScaling
      TargetTrackingConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ASGAverageCPUUtilization
        TargetValue: 70.0

  # Backend Auto Scaling Group
  BackendASG:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      VPCZoneIdentifier:
        - !Ref PublicSubnet1Id
        - !Ref PublicSubnet2Id
      LaunchTemplate:
        LaunchTemplateId: !Ref BackendLaunchTemplate
        Version: !GetAtt BackendLaunchTemplate.LatestVersionNumber
      MinSize: '1'
      MaxSize: '2'
      TargetGroupARNs:
        - !Ref BackendTargetGroupArn
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-Backend
          PropagateAtLaunch: true

  BackendScalingPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref BackendASG
      PolicyType: TargetTrackingScaling
      TargetTrackingConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ASGAverageCPUUtilization
        TargetValue: 70.0

Outputs:
  FrontendASGName:
    Description: Frontend Auto Scaling Group Name
    Value: !Ref FrontendASG
    Export:
      Name: !Sub ${EnvironmentName}-Frontend-ASG
  
  BackendASGName:
    Description: Backend Auto Scaling Group Name
    Value: !Ref BackendASG
    Export:
      Name: !Sub ${EnvironmentName}-Backend-ASG
