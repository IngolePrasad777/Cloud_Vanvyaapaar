AWSTemplateFormatVersion: '2010-09-09'
Description: 'Load Balancer Stack - ALB, Target Groups, Listeners'

Parameters:
  EnvironmentName:
    Type: String
    Description: Environment name prefix
  PublicSubnet1Id:
    Type: String
    Description: Public Subnet 1 ID
  PublicSubnet2Id:
    Type: String
    Description: Public Subnet 2 ID
  VPCId:
    Type: String
    Description: VPC ID
  ExternalALBSecurityGroupId:
    Type: String
    Description: ALB Security Group ID

Resources:
  ExternalALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub ${EnvironmentName}-ex-alb
      Scheme: internet-facing
      Subnets:
        - !Ref PublicSubnet1Id
        - !Ref PublicSubnet2Id
      SecurityGroups:
        - !Ref ExternalALBSecurityGroupId
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-ALB

  FrontendTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${EnvironmentName}-frontend-tg
      Port: 80
      Protocol: HTTP
      VpcId: !Ref VPCId
      HealthCheckPath: /
      Matcher:
        HttpCode: 200,302
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-Frontend-TG

  BackendTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${EnvironmentName}-backend-tg
      Port: 8080
      Protocol: HTTP
      VpcId: !Ref VPCId
      HealthCheckPath: /public/products
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: 200,204
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-Backend-TG

  ExternalListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref FrontendTargetGroup
      LoadBalancerArn: !Ref ExternalALB
      Port: 80
      Protocol: HTTP

  BackendListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref ExternalListener
      Priority: 10
      Conditions:
        - Field: path-pattern
          Values:
            - /seller/*
            - /public/*
            - /buyer/*
            - /auth/*
            - /admin/*
      Actions:
        - Type: forward
          TargetGroupArn: !Ref BackendTargetGroup

Outputs:
  ExternalALBDNS:
    Description: External ALB DNS Name
    Value: !GetAtt ExternalALB.DNSName
    Export:
      Name: !Sub ${EnvironmentName}-ALB-DNS
  
  ExternalALBArn:
    Description: External ALB ARN
    Value: !Ref ExternalALB
    Export:
      Name: !Sub ${EnvironmentName}-ALB-ARN
  
  FrontendTargetGroupArn:
    Description: Frontend Target Group ARN
    Value: !Ref FrontendTargetGroup
    Export:
      Name: !Sub ${EnvironmentName}-Frontend-TG-ARN
  
  BackendTargetGroupArn:
    Description: Backend Target Group ARN
    Value: !Ref BackendTargetGroup
    Export:
      Name: !Sub ${EnvironmentName}-Backend-TG-ARN
